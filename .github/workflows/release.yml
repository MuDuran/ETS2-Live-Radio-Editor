name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare bundled ffmpeg
        shell: pwsh
        run: |
          $ffmpegZipUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $downloadPath = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials"

          Invoke-WebRequest -Uri $ffmpegZipUrl -OutFile $downloadPath
          if (Test-Path $extractDir) {
            Remove-Item -LiteralPath $extractDir -Recurse -Force
          }
          Expand-Archive -LiteralPath $downloadPath -DestinationPath $extractDir -Force

          $ffmpegPath = Get-ChildItem -Path $extractDir -Filter ffmpeg.exe -Recurse |
            Where-Object { $_.FullName -match "\\bin\\ffmpeg\.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $ffmpegPath) {
            throw "Could not locate ffmpeg.exe inside the downloaded full build archive."
          }

          New-Item -ItemType Directory -Force -Path vendor/ffmpeg | Out-Null
          Copy-Item -LiteralPath $ffmpegPath -Destination vendor/ffmpeg/ffmpeg.exe -Force

      - name: Verify bundled ffmpeg
        shell: pwsh
        run: |
          npm run verify:bundled-ffmpeg

      - name: Build distributable packages
        shell: pwsh
        run: |
          npm run build:release

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
          generate_release_notes: true

      - name: Upload release artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ets2-and-ats-live-radio-editor-windows
          path: dist-electron/*.exe
