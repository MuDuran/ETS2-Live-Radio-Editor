name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Prepare bundled ffmpeg
        shell: pwsh
        run: |
          $candidatePaths = @(
            "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe",
            "C:\ProgramData\chocolatey\bin\ffmpeg.exe"
          )

          $ffmpegPath = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $ffmpegPath) {
            throw "Could not locate a bundled ffmpeg executable after Chocolatey install."
          }

          $ffmpegItem = Get-Item $ffmpegPath
          if ($ffmpegItem.Length -lt 5MB) {
            throw "The located ffmpeg executable is too small ($($ffmpegItem.Length) bytes). This looks like a wrapper instead of the real binary."
          }

          New-Item -ItemType Directory -Force -Path vendor/ffmpeg | Out-Null
          Copy-Item -LiteralPath $ffmpegPath -Destination vendor/ffmpeg/ffmpeg.exe -Force

      - name: Verify bundled ffmpeg
        shell: pwsh
        run: |
          npm run verify:bundled-ffmpeg

      - name: Build distributable packages
        shell: pwsh
        run: |
          npm run build:release

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
          generate_release_notes: true

      - name: Upload release artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ets2-live-radio-editor-windows
          path: dist-electron/*.exe
